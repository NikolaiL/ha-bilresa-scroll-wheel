blueprint:
  name: IKEA Bilresa Scroll Wheel — Smooth Dimmer / Color / Scene
  description: |
    Control a light (or light group) with one channel of the IKEA BILRESA scroll wheel
    (Matter), with a MODE selector — use the wheel as a smooth **dimmer**, a **color**
    selector (color temperature or hue), or a **scene** selector.

    ONE AUTOMATION = ONE CHANNEL controlling ONE light/group.
    The wheel has 3 channels; create up to 3 automations from this blueprint.
    Event-entity mapping (Matter):
      • Channel 1 → scroll: ..._button_1 / ..._button_2   button: ..._button_3
      • Channel 2 → scroll: ..._button_4 / ..._button_5   button: ..._button_6
      • Channel 3 → scroll: ..._button_7 / ..._button_8   button: ..._button_9
    Pick the two scroll entities for "up" and "down"; if the direction feels reversed,
    just swap them.

    SMOOTH DIMMING
    The wheel emits discrete "notch" events (not a hold/release), so instead of stepping,
    each scroll glides the light to an absolute target with a transition scaled to how far
    you scrolled (Glide time per notch). Consecutive scrolls blend, so the bulb's own
    transition engine produces a continuous ramp. Same technique for color temp and hue.

    Credits: event model from aydinseven7/ha-blueprints (bilresa-scroll-wheel);
    smooth-ramp idea from Kaito-Mez/HA-Blueprints (Bilresa Dual Button).
  source_url: https://github.com/NikolaiL/ha-bilresa-scroll-wheel/blob/main/bilresa_scroll_wheel_smooth.yaml
  domain: automation
  input:
    target_light:
      name: Light(s) / light group to control
      description: The light or light-group entity this channel controls (dim / color modes).
      selector:
        entity:
          domain: light
          multiple: true

    controls:
      name: Scroll wheel channel entities
      description: Select the two scroll entities and the push-button for the channel you want to use.
      input:
        scroll_up_entity:
          name: "Scroll UP / clockwise event entity (e.g. ..._button_1)"
          selector:
            entity:
              domain: event
        scroll_down_entity:
          name: "Scroll DOWN / counter-clockwise event entity (e.g. ..._button_2)"
          selector:
            entity:
              domain: event
        button_entity:
          name: "Push-button event entity (e.g. ..._button_3)"
          selector:
            entity:
              domain: event

    scroll_mode:
      name: Scroll mode
      default: dim
      selector:
        select:
          options:
            - label: "Dimmer (smooth)"
              value: dim
            - label: "Color temperature (smooth)"
              value: color_temp
            - label: "Color / hue (smooth)"
              value: hue
            - label: "Scene selector"
              value: scene

    scene_select:
      name: "Scene input_select (scene mode only)"
      description: >
        For scene mode: an input_select helper whose options are scene entity_ids
        (e.g. scene.movie). Scrolling steps through it and activates the selection.
      default: ""
      selector:
        entity:
          domain: input_select

    button_actions:
      name: Button actions (optional)
      collapsed: true
      input:
        click_action:
          name: Button click action
          default: []
          selector:
            action: {}
        double_click_action:
          name: Button double-click action
          default: []
          selector:
            action: {}
        triple_click_action:
          name: Button triple-click action
          default: []
          selector:
            action: {}
        hold_action:
          name: Button hold action
          default: []
          selector:
            action: {}

    dim_settings:
      name: Dimmer settings (smooth)
      collapsed: true
      input:
        dim_step_pct:
          name: Brightness step per notch (%)
          default: 6
          selector:
            number: { min: 1, max: 50, step: 1, unit_of_measurement: "%", mode: slider }
        dim_min_pct:
          name: Minimum brightness (%)
          description: Dimming never goes below this (won't turn the light off).
          default: 3
          selector:
            number: { min: 1, max: 50, step: 1, unit_of_measurement: "%", mode: slider }
        notch_glide:
          name: Glide time per notch (s)
          description: The smoothness knob. Longer = smoother/slower; consecutive scrolls blend.
          default: 0.4
          selector:
            number: { min: 0, max: 1.5, step: 0.05, unit_of_measurement: s, mode: slider }
        max_glide:
          name: Maximum glide time (s)
          default: 2.5
          selector:
            number: { min: 0.2, max: 6, step: 0.1, unit_of_measurement: s, mode: slider }

    color_settings:
      name: Color settings (smooth)
      collapsed: true
      input:
        min_color_temp:
          name: Minimum color temperature (K)
          default: 2200
          selector:
            number: { min: 1000, max: 6500, step: 50, unit_of_measurement: K, mode: box }
        max_color_temp:
          name: Maximum color temperature (K)
          default: 6500
          selector:
            number: { min: 1000, max: 6500, step: 50, unit_of_measurement: K, mode: box }
        color_temp_step:
          name: Color temperature step per notch (K)
          default: 150
          selector:
            number: { min: 10, max: 1000, step: 10, unit_of_measurement: K, mode: box }
        color_hue_step:
          name: Hue step per notch (deg)
          default: 12
          selector:
            number: { min: 1, max: 60, step: 1, unit_of_measurement: "°", mode: box }
        color_saturation:
          name: Hue saturation (%)
          default: 100
          selector:
            number: { min: 0, max: 100, step: 1, unit_of_measurement: "%", mode: slider }

    misc_settings:
      name: Miscellaneous
      collapsed: true
      input:
        scene_transition:
          name: Scene transition (s)
          default: 0.5
          selector:
            number: { min: 0, max: 5, step: 0.1, unit_of_measurement: s, mode: box }
        max_queued:
          name: Max queued automation calls
          default: 20
          selector:
            number: { min: 1, max: 50, step: 1, mode: box }

# ============================ AUTOMATION ============================
alias: IKEA Bilresa Scroll Wheel — Smooth
mode: queued
max: !input max_queued
max_exceeded: silent

variables:
  target_light: !input target_light
  mode: !input scroll_mode
  scene_helper: !input scene_select
  var_dim_step_pct: !input dim_step_pct
  var_dim_min_pct: !input dim_min_pct
  var_notch_glide: !input notch_glide
  var_max_glide: !input max_glide
  var_min_color_temp: !input min_color_temp
  var_max_color_temp: !input max_color_temp
  var_color_temp_step: !input color_temp_step
  var_color_hue_step: !input color_hue_step
  var_color_saturation: !input color_saturation
  var_scene_transition: !input scene_transition

triggers:
  - trigger: state
    entity_id: !input scroll_up_entity
    not_from: unavailable
    not_to: unavailable
    id: scroll_up
  - trigger: state
    entity_id: !input scroll_down_entity
    not_from: unavailable
    not_to: unavailable
    id: scroll_down
  - trigger: state
    entity_id: !input button_entity
    not_from: unavailable
    not_to: unavailable
    id: button

conditions: []

actions:
  - variables:
      is_scroll: "{{ trigger.id in ['scroll_up','scroll_down'] }}"
      direction: "{{ 'up' if trigger.id == 'scroll_up' else ('down' if trigger.id == 'scroll_down' else '') }}"
      dir_sign: "{{ 1 if trigger.id == 'scroll_up' else -1 }}"
      clicks: "{{ trigger.to_state.attributes.totalNumberOfPressesCounted | int(1) if is_scroll else 0 }}"
      ev: "{{ trigger.to_state.attributes.event_type if not is_scroll else '' }}"
      glide: "{{ [ (clicks | int) * var_notch_glide, var_max_glide ] | min }}"

  - choose:
      # ---------- Button ----------
      - conditions: "{{ not is_scroll and ev == 'multi_press_1' }}"
        sequence: !input click_action
      - conditions: "{{ not is_scroll and ev == 'multi_press_2' }}"
        sequence: !input double_click_action
      - conditions: "{{ not is_scroll and ev == 'multi_press_3' }}"
        sequence: !input triple_click_action
      - conditions: "{{ not is_scroll and ev == 'long_press' }}"
        sequence: !input hold_action

      # ---------- Scroll: scene selector ----------
      - conditions: "{{ is_scroll and mode == 'scene' and scene_helper }}"
        sequence:
          - repeat:
              count: "{{ clicks | int }}"
              sequence:
                - action: "{{ 'input_select.select_next' if direction == 'up' else 'input_select.select_previous' }}"
                  target:
                    entity_id: "{{ scene_helper }}"
                  data:
                    cycle: true
          - action: scene.turn_on
            target:
              entity_id: "{{ states(scene_helper) }}"
            data:
              transition: "{{ var_scene_transition }}"

      # ---------- Scroll: light modes ----------
      - conditions: "{{ is_scroll and mode in ['dim','color_temp','hue'] and target_light | count > 0 }}"
        sequence:
          - repeat:
              for_each: "{{ target_light }}"
              sequence:
                - choose:
                    # ----- smooth dim -----
                    - conditions: "{{ mode == 'dim' }}"
                      sequence:
                        - variables:
                            step255: "{{ (var_dim_step_pct / 100 * 255) | round(0) | int }}"
                            floor255: "{{ (var_dim_min_pct / 100 * 255) | round(0) | int }}"
                        - if: "{{ is_state(repeat.item, 'on') }}"
                          then:
                            - variables:
                                cur: "{{ state_attr(repeat.item, 'brightness') | int(0) }}"
                                target: "{{ [ [ cur + dir_sign * (clicks | int) * (step255 | int), 255 ] | min, floor255 | int ] | max }}"
                            - action: light.turn_on
                              target:
                                entity_id: "{{ repeat.item }}"
                              data:
                                brightness: "{{ target | int }}"
                                transition: "{{ glide }}"
                          else:
                            - if: "{{ direction == 'up' }}"
                              then:
                                - action: light.turn_on
                                  target:
                                    entity_id: "{{ repeat.item }}"
                                  data:
                                    brightness: "{{ floor255 | int }}"
                                    transition: "{{ glide }}"
                    # ----- smooth color temperature -----
                    - conditions: "{{ mode == 'color_temp' }}"
                      sequence:
                        - variables:
                            cur: "{{ state_attr(repeat.item, 'color_temp_kelvin') | int(var_min_color_temp | int) }}"
                            target: "{{ [ [ cur + dir_sign * (clicks | int) * (var_color_temp_step | int), var_max_color_temp | int ] | min, var_min_color_temp | int ] | max }}"
                        - action: light.turn_on
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            color_temp_kelvin: "{{ target | int }}"
                            transition: "{{ glide }}"
                    # ----- smooth hue -----
                    - conditions: "{{ mode == 'hue' }}"
                      sequence:
                        - variables:
                            cur: "{{ (state_attr(repeat.item, 'hs_color')[0] if state_attr(repeat.item, 'hs_color') else 0) | float }}"
                            target: "{{ (cur + dir_sign * (clicks | int) * (var_color_hue_step | float)) % 360 }}"
                        - action: light.turn_on
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            hs_color: "{{ [ target | round(1), var_color_saturation | float ] }}"
                            transition: "{{ glide }}"
